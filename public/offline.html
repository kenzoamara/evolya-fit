<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hors ligne — Evolya'Fit</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:#0D1F3C;color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:32px 24px;gap:22px}
    .ring{width:88px;height:88px}
    h1{font-size:22px;font-weight:800;margin:0;letter-spacing:-.01em}
    p{font-size:14px;line-height:1.6;color:rgba(255,255,255,.6);margin:0;max-width:320px}
    button{margin-top:6px;background:#4E9B6F;color:#fff;border:0;border-radius:12px;
      padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
    button:active{background:#3d8058;transform:scale(.98)}
    .brand{position:absolute;bottom:28px;font-size:12px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:.02em}
    .brand span{color:#4E9B6F}
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="ring" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <path d="M32 6a26 26 0 1 0 19 8.5" stroke="#4E9B6F" stroke-width="7" stroke-linecap="round"/>
    </svg>
    <h1>Pas de connexion</h1>
    <p>Tu n'es plus connecté à internet. Vérifie ta connexion (Wi-Fi ou données mobiles) puis réessaie.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
  <div class="brand">Evolya<span>'Fit</span></div>
  <script>
    // Recharge automatiquement dès que la connexion revient
    window.addEventListener('online', function () { location.reload() })
  </script>
</body>
</html>
