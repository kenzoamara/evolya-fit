workflows:
  android-workflow:
    name: Android Build (AAB - Play Store)
    max_build_duration: 60
    environment:
      node: 22.11.0
      java: 21
      vars:
        # Ces variables doivent etre configurees dans Codemagic > App Settings > Environment variables
        # ANDROID_KEYSTORE_PASSWORD: <votre mot de passe keystore>
        # ANDROID_KEY_ALIAS: evolya-key
        # ANDROID_KEY_PASSWORD: <votre mot de passe cle>
        # ANDROID_KEYSTORE_PATH: est defini automatiquement via keystore upload
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Setup keystore
        script: |
          # CM_KEYSTORE est le nom de la variable File uploadee dans Codemagic
          # Codemagic la met automatiquement au chemin du fichier temporaire
          if [ -n "$CM_KEYSTORE" ]; then
            export ANDROID_KEYSTORE_PATH="$CM_KEYSTORE"
          else
            echo "ERREUR: variable CM_KEYSTORE manquante dans Codemagic Environment variables"
            exit 1
          fi
          echo "Keystore path: $ANDROID_KEYSTORE_PATH"
          echo "Key alias: $ANDROID_KEY_ALIAS"
      - name: Build Android AAB (Play Store)
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

  ios-workflow:
    name: iOS Build (IPA - App Store)
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
      vars:
        # Ces variables doivent etre configurees dans Codemagic > App Settings > Environment variables
        # APP_STORE_CONNECT_KEY_IDENTIFIER: <votre key ID>
        # APP_STORE_CONNECT_ISSUER_ID: <votre issuer ID>
        # APP_STORE_CONNECT_PRIVATE_KEY: <votre cle privee .p8>
        # CERTIFICATE_PRIVATE_KEY: <votre cle privee de distribution>
    integrations:
      app_store_connect: codemagic_api_key
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files fr.evolyafit.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath ios/App/build
    artifacts:
      - ios/App/build/**/*.ipa
      - ios/App/App.xcarchive/**
