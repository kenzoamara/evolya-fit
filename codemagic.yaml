workflows:
  android-workflow:
    name: Android Build (AAB - Play Store)
    max_build_duration: 60
    environment:
      node: 22.11.0
      java: 21
      groups:
        - android_signing
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Prepare web assets (out/)
        script: |
          # L'app Capacitor charge l'URL distante (evolyafit.fr) ; on fournit
          # un placeholder minimal pour que `cap sync` trouve le webDir 'out'.
          mkdir -p out
          cat > out/index.html <<'HTML'
          <!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
          <title>Evolya'Fit</title><style>html,body{margin:0;height:100%;background:#0D1F3C;color:#fff;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}.wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}.logo{font-size:30px;font-weight:800}.logo span{color:#4E9B6F}.sp{width:30px;height:30px;border:3px solid rgba(255,255,255,.18);border-top-color:#4E9B6F;border-radius:50%;animation:r .8s linear infinite}.t{font-size:13px;color:rgba(255,255,255,.55)}@keyframes r{to{transform:rotate(360deg)}}</style></head>
          <body><div class="wrap"><div class="logo">Evolya<span>'Fit</span></div><div class="sp"></div><div class="t">Chargement…</div></div></body></html>
          HTML
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android AAB (Play Store)
        script: |
          # Decoder le keystore base64 vers un fichier temporaire
          if [ -z "$CM_KEYSTORE" ]; then
            echo "ERREUR: variable CM_KEYSTORE manquante"
            exit 1
          fi
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/evolya-release.jks
          export ANDROID_KEYSTORE_PATH="/tmp/evolya-release.jks"
          echo "Keystore: $ANDROID_KEYSTORE_PATH | Alias: $ANDROID_KEY_ALIAS"
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

  ios-workflow:
    name: iOS Build (IPA - App Store)
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: codemagic_api_key
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Prepare web assets (out/)
        script: |
          # Placeholder minimal pour que `cap sync` trouve le webDir 'out'
          # (l'app charge l'URL distante evolyafit.fr).
          mkdir -p out
          cat > out/index.html <<'HTML'
          <!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
          <title>Evolya'Fit</title><style>html,body{margin:0;height:100%;background:#0D1F3C;color:#fff;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}.wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}.logo{font-size:30px;font-weight:800}.logo span{color:#4E9B6F}.sp{width:30px;height:30px;border:3px solid rgba(255,255,255,.18);border-top-color:#4E9B6F;border-radius:50%;animation:r .8s linear infinite}.t{font-size:13px;color:rgba(255,255,255,.55)}@keyframes r{to{transform:rotate(360deg)}}</style></head>
          <body><div class="wrap"><div class="logo">Evolya<span>'Fit</span></div><div class="sp"></div><div class="t">Chargement…</div></div></body></html>
          HTML
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files fr.evolyafit.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath ios/App/build
    artifacts:
      - ios/App/build/**/*.ipa
      - ios/App/App.xcarchive/**
