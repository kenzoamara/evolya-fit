workflows:
  android-workflow:
    name: Android Build (AAB - Play Store)
    max_build_duration: 60
    environment:
      node: 22.11.0
      java: 21
      groups:
        - android_signing
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android AAB (Play Store)
        script: |
          # Decoder le keystore base64 vers un fichier temporaire
          if [ -z "$CM_KEYSTORE" ]; then
            echo "ERREUR: variable CM_KEYSTORE manquante"
            exit 1
          fi
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/evolya-release.jks
          export ANDROID_KEYSTORE_PATH="/tmp/evolya-release.jks"
          echo "Keystore: $ANDROID_KEYSTORE_PATH | Alias: $ANDROID_KEY_ALIAS"
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

  ios-workflow:
    name: iOS Build (IPA - App Store)
    max_build_duration: 120
    environment:
      node: 22.11.0
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: codemagic_api_key
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files fr.evolyafit.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath ios/App/build
    artifacts:
      - ios/App/build/**/*.ipa
      - ios/App/App.xcarchive/**
